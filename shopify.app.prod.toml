client_id = "c69ae7252e8eadedfee50d8cc39e3b1a"
name = "customer-discount-panel"
application_url = "https://customer-discount-panel.onrender.com"
embedded = true

[build]
automatically_update_urls_on_dev = false

[webhooks]
api_version = "2026-04"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

  [[webhooks.subscriptions]]
  topics = [ "orders/create" ]
  uri = "/webhooks/orders/create"

[access_scopes]
scopes = "read_customers,write_customers,read_orders,write_orders"

[auth]
redirect_urls = [
  "https://customer-discount-panel.onrender.com/auth/callback",
  "https://customer-discount-panel.onrender.com/api/auth/callback",
  "https://customer-discount-panel.onrender.com/api/auth"
]
[app_proxy]
url = "https://customer-discount-panel.onrender.com/apps/invoice-request"
subpath = "invoice-request"
prefix = "apps"
